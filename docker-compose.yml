services:
  bene_bank:
    build:
      context: .
      dockerfile: bene_bank/Dockerfile
    env_file:
      - .env
    environment:
      - PYTHONUNBUFFERED=1
      - FLASK_ENV=development
      - FLASK_DEBUG=0
      - PORT=6001
      - NPCI_URL=http://npci:6002
      - ORCHESTRATOR_URL=http://host.docker.internal:8881
      - PYTHONPATH=/app:/app/bene_bank
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "${BENE_BANK_PORT:-5090}:6001"
    volumes:
      - .:/app
    working_dir: /app
    command: python3 bene_bank/app.py
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  npci:
    build:
      context: .
      dockerfile: npci/Dockerfile
    env_file:
      - .env
    environment:
      - PYTHONUNBUFFERED=1
      - FLASK_ENV=development
      - FLASK_DEBUG=0
      - PORT=6002
      - PAYEE_PSP_URL=http://payee_psp:6003
      - REM_BANK_URL=http://rem_bank:6005
      - BENE_BANK_URL=http://bene_bank:6001
      - PAYER_PSP_URL=http://payer_psp:6004
      - ORCHESTRATOR_URL=http://host.docker.internal:8881
      - PYTHONPATH=/app:/app/npci
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "${NPCI_PORT:-5050}:6002"
    volumes:
      - .:/app
    working_dir: /app
    command: python3 npci/app.py
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  payee_psp:
    build: ./payee_psp
    env_file:
      - .env
    environment:
      - PYTHONUNBUFFERED=1
      - FLASK_ENV=development
      - FLASK_DEBUG=0
      - PORT=6003
    ports:
      - "${PAYEE_PSP_PORT:-5070}:6003"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  payer_psp:
    build: ./payer_psp
    env_file:
      - .env
    environment:
      - PYTHONUNBUFFERED=1
      - FLASK_ENV=development
      - FLASK_DEBUG=0
      - PORT=6004
      - NPCI_URL=http://npci:6002
    ports:
      - "${PAYER_PSP_PORT:-5060}:6004"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  rem_bank:
    build:
      context: .
      dockerfile: rem_bank/Dockerfile
    env_file:
      - .env
    environment:
      - PYTHONUNBUFFERED=1
      - FLASK_ENV=development
      - FLASK_DEBUG=0
      - PORT=6005
      - NPCI_URL=http://npci:6002
      - ORCHESTRATOR_URL=http://host.docker.internal:8881
      - PYTHONPATH=/app:/app/rem_bank
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "${REM_BANK_PORT:-5080}:6005"
    volumes:
      - .:/app
    working_dir: /app
    command: python3 rem_bank/app.py
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  orchestrator:
    build:
      context: .
      dockerfile: Dockerfile.orchestrator
    env_file:
      - .env
    environment:
      - PYTHONUNBUFFERED=1
      - FLASK_ENV=development
      - FLASK_DEBUG=0
      - ORCHESTRATOR_PORT=6000
      - NPCI_URL=http://npci:6002
    volumes:
      - .:/app
    ports:
      - "${ORCHESTRATOR_PORT:-8881}:6000"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  payment_ui:
    build:
      context: .
      dockerfile: payment_ui/Dockerfile
    env_file:
      - .env
    environment:
      - PYTHONUNBUFFERED=1
      - FLASK_ENV=development
      - FLASK_DEBUG=0
      - PAYMENT_UI_PORT=8882
      - PAYER_PSP_URL=http://payer_psp:6004
    ports:
      - "${PAYMENT_UI_PORT:-8882}:8882"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"